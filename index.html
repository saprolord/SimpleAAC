<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAC Project Alpha</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; padding: 10px; 
            background: #1a1a1a; /* Dark background for high contrast */
            display: flex; flex-direction: column; height: 100vh;
            box-sizing: border-box;
            overflow: hidden; /* Prevents accidental scrolling */
        }

        /* Large Display Area */
        #display {
            width: 100%; height: 20%;
            background: white; border-radius: 10px;
            font-size: 3rem; display: flex; align-items: center;
            padding: 0 20px; margin-bottom: 10px;
            box-sizing: border-box; overflow-x: auto; white-space: nowrap;
        }

        /* Keyboard Grid */
        .keyboard {
        display: grid;
        grid-template-columns: repeat(7, 1fr); 
        grid-template-rows: repeat(5, 1fr);
        gap: 10px; 
        flex-grow: 1;
    }

        button {
            background: #444; color: white; border: none;
            border-radius: 12px; font-size: 1.8rem; font-weight: bold;
            box-shadow: 0 6px #000; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px #000;
            background: #666;
        }

        /* Functional Keys Styling */
        .space { grid-column: span 3; background: #555; }
        .del { background: #d97706; } 
        .clear { background: #dc2626; }

        /* The "Big" Speak Button in the Lower Right */
        .speak { 
            grid-column: 6 / 8; /* Starts at column 6, ends at 8 */
            grid-row: 4 / 6;    /* Spans the last two rows */
            background: #16a34a; 
            font-size: 2.2rem;
        }

        /* Voice Selector (Tucked at top) */
        #voiceSelect { margin-bottom: 10px; padding: 5px; width: 100%; }
    </style>
</head>
<body>

    <select id="voiceSelect"></select>
    <div id="display"></div>

    <div class="keyboard" id="keyboard">
        </div>

    <script>
        const display = document.getElementById('display');
        const keyboard = document.getElementById('keyboard');
        const voiceSelect = document.getElementById('voiceSelect');

        let text = "";

        // 1. Create Alphabet Keys
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        letters.forEach(char => {
            const btn = document.createElement('button');
            btn.innerText = char;
            btn.onclick = () => { text += char; updateDisplay(); };
            keyboard.appendChild(btn);
        });

        // 2. Add Functional Keys
        const keys = [
            { label: 'SPACE', class: 'space', action: () => text += " " },
            { label: '⌫', class: 'del', action: () => text = text.slice(0, -1) },
            { label: 'CLEAR', class: 'clear', action: () => text = "" },
            { label: '🔊 SPEAK', class: 'speak', action: () => speak() }
        ];

        keys.forEach(k => {
            const btn = document.createElement('button');
            btn.innerText = k.label;
            btn.className = k.class;
            btn.onclick = () => { k.action(); updateDisplay(); };
            keyboard.appendChild(btn);
        });

        function updateDisplay() {
            display.innerText = text;
            // Scroll to the end of the text
            display.scrollLeft = display.scrollWidth;
        }

        function speak() {
            if (!text) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            msg.voice = voices.find(v => v.name === voiceSelect.value);
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        // Voice Population (Filtered for UK)
        function populateVoices() {
            const voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en-GB'));
            voiceSelect.innerHTML = voices.map(v => `<option value="${v.name}">${v.name}</option>`).join('');
        }
        window.speechSynthesis.onvoiceschanged = populateVoices;
    </script>
</body>
</html>
