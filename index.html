<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAC Project Alpha</title>
    <style>
        /* Modern, clean look with high contrast for accessibility */
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
            background: #e5e7eb; 
        }

        #display { 
            width: 100%; 
            height: 100px; 
            font-size: 2.5rem; 
            margin-bottom: 20px; 
            padding: 15px; 
            border: 4px solid #374151; 
            border-radius: 12px; 
            box-sizing: border-box;
        }

        .controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select { padding: 10px; border-radius: 5px; flex-grow: 1; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            flex-grow: 1; 
        }

        button { 
            font-size: 1.5rem; 
            font-weight: bold; 
            cursor: pointer; 
            border: none; 
            border-radius: 15px; 
            background: #3b82f6; 
            color: white; 
            box-shadow: 0 6px #2563eb; 
            transition: 0.1s; 
        }

        button:active { 
            box-shadow: 0 2px #2563eb; 
            transform: translateY(4px); 
        }

        .speak-btn { background: #10b981; box-shadow: 0 6px #059669; grid-column: span 3; height: 80px; margin-top: 10px; }
        .clear-btn { background: #ef4444; box-shadow: 0 6px #dc2626; }
    </style>
</head>
<body>

    <input type="text" id="display" placeholder="Type or use buttons...">

    <div class="controls">
        <label for="voiceSelect">Voice:</label>
        <select id="voiceSelect"><option>Loading...</option></select>
    </div>
    
    <div class="grid">
        <button onclick="addText('Yes')">YES</button>
        <button onclick="addText('No')">NO</button>
        <button onclick="addText('Help')">HELP</button>
        <button onclick="addText('Water')">WATER</button>
        <button onclick="addText('Food')">FOOD</button>
        <button class="clear-btn" onclick="clearText()">CLEAR</button>
        <button class="speak-btn" onclick="speak()">🔊 SPEAK</button>
    </div>

    <script>
        const display = document.getElementById('display');
        const voiceSelect = document.getElementById('voiceSelect');

        // 1. Populate the Voice List
    function populateVoices() {
        const voices = window.speechSynthesis.getVoices();
        const currentSelection = voiceSelect.value; // Remember what was picked
    
        voiceSelect.innerHTML = '';
    
        voices.forEach(voice => {
            const option = document.createElement('option');
            option.textContent = `${voice.name} (${voice.lang})`;
            option.value = voice.name;
            voiceSelect.appendChild(option);
        });

        // If we already had a selection, keep it!
        if (currentSelection && currentSelection !== "Loading...") {
            voiceSelect.value = currentSelection;
        } else {
            // Otherwise, try to find a "Natural" one for the first time
            const naturalVoice = voices.find(v => v.name.includes('Natural') || v.name.includes('Google'));
            if (naturalVoice) {
                voiceSelect.value = naturalVoice.name;
            }
        }
}

        window.speechSynthesis.onvoiceschanged = populateVoices;

        // 2. Button Logic
        function addText(word) {
            display.value += (display.value ? ' ' : '') + word;
            display.focus();
        }

        function clearText() {
            display.value = '';
        }

        // 3. Speech Logic
        function speak() {
            const text = display.value;
            if (!text) return;

            // CANCEL any current speech before starting new speech
            // This prevents "queueing up" multiple voices if you click fast
            window.speechSynthesis.cancel();

            const msg = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            
            // Find the specific voice object that matches the name in the dropdown
            const selectedVoice = voices.find(v => v.name === voiceSelect.value);
            if (selectedVoice) {
                msg.voice = selectedVoice;
            }

            msg.rate = 0.9; 
            window.speechSynthesis.speak(msg);
        }

        // 4. Physical Keyboard Logic
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                speak();
            } else if (e.key === 'Escape') {
                clearText();
            } else {
                // Keep the input box focused for typing
                if (document.activeElement !== display) {
                    display.focus();
                }
            }
        });
    </script>
</body>
</html>
